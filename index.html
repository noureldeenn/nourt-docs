<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nourt theme — Documentation &amp; Support</title>
    <meta name="description" content="Documentation and support for the Nourt Shopify theme." />
    <style>
      :root { --ink: #1f2937; --muted: #6b7280; --line: #e5e7eb; --brand: #0284c7; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        background: #f9fafb; color: var(--ink);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; line-height: 1.5;
        padding: 2rem 1rem;
      }
      .card {
        max-width: 560px; width: 100%; background: #fff; border: 1px solid var(--line);
        border-radius: 18px; padding: 2.5rem; text-align: center;
      }
      .brand { display: inline-flex; align-items: center; gap: .6rem; margin-bottom: 1rem; }
      .mark { width: 40px; height: 40px; border-radius: 12px; background: var(--brand); position: relative; }
      .mark::after {
        content: ""; position: absolute; inset: 11px;
        border-left: 3px solid #fff; border-right: 3px solid #fff; transform: skewX(-18deg);
      }
      .brand b { font-size: 1.5rem; letter-spacing: -0.01em; }
      p { color: var(--muted); }
      .links { display: grid; gap: .75rem; margin-top: 1.75rem; }
      a.btn {
        display: block; padding: .85rem 1rem; border-radius: 12px; text-decoration: none;
        font-weight: 600; border: 1px solid var(--line); color: var(--ink);
      }
      a.btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
      a.btn:hover { border-color: var(--brand); }
      a.btn.primary:hover { background: #111827; }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="brand"><span class="mark" aria-hidden="true"></span><b>Nourt</b></span>
      <p>Documentation and support for the Nourt Shopify theme.</p>
      <div class="links">
        <a class="btn primary" href="documentation.html">Read the documentation</a>
        <a class="btn" href="support-contact-form.html">Contact support</a>
      </div>
    </main>
  </body>
</html>
