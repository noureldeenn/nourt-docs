<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nourt theme — Request received</title>
    <meta name="robots" content="noindex" />
    <style>
      :root { --ink: #1f2937; --muted: #6b7280; --line: #e5e7eb; --brand: #0284c7; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        background: #f9fafb; color: var(--ink);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; line-height: 1.5;
        padding: 2rem 1rem;
      }
      .card {
        max-width: 520px; width: 100%; background: #fff; border: 1px solid var(--line);
        border-radius: 18px; padding: 2.5rem; text-align: center;
      }
      .check {
        width: 56px; height: 56px; border-radius: 50%; background: #ecfdf5;
        display: grid; place-items: center; margin: 0 auto 1.25rem;
      }
      .check svg { width: 30px; height: 30px; stroke: #059669; fill: none; stroke-width: 3; }
      h1 { margin: 0 0 .5rem; font-size: 1.5rem; }
      p { color: var(--muted); margin: .25rem 0 0; }
      a.btn {
        display: inline-block; margin-top: 1.75rem; padding: .7rem 1.4rem; border-radius: 999px;
        background: var(--ink); color: #fff; text-decoration: none; font-weight: 600;
      }
      a.btn:hover { background: #111827; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="check" aria-hidden="true">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6.5" /></svg>
      </div>
      <h1>Request received</h1>
      <p>
        Thanks for reaching out. We've sent a confirmation to your email and will
        reply within two business days.
      </p>
      <a class="btn" href="documentation.html">Back to documentation</a>
    </main>
  </body>
</html>
